# Supabase CLI Config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://your-production-domain.com"]
jwt_expiry = 3600
enable_signup = false          # Only admins invite users — no self-signup

[auth.email]
enable_confirmations = true



[functions.daily-report]
verify_jwt = false             # Called by cron, no user JWT

[functions.absence-alert]
verify_jwt = false             # Called by database webhook

[functions.send-notification]
verify_jwt = true              # Called by authenticated teacher/admin
